<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>美西公路旅行</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600&display=swap" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }

    body {
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f2f7;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─ Header ─ */
    header {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 0.5px solid rgba(60,60,67,0.15);
      padding: 11px 18px;
      display: flex;
      align-items: center;
      gap: 11px;
      z-index: 1000;
      flex-shrink: 0;
    }

    .hdr-icon {
      width: 34px; height: 34px;
      background: linear-gradient(145deg, #ff9500, #ff5e00);
      border-radius: 9px;
      display: grid; place-items: center;
      font-size: 1rem; flex-shrink: 0;
      box-shadow: 0 1px 6px rgba(255,90,0,0.28);
    }

    header h1 { font-size: 0.98rem; font-weight: 600; color: #000; letter-spacing: -0.3px; }
    header p  { font-size: 0.67rem; color: rgba(60,60,67,0.48); margin-top: 1px; letter-spacing: -0.1px; }

    /* ─ Layout ─ */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ─ Sidebar ─ */
    .sidebar {
      width: 280px; min-width: 280px;
      background: #f2f2f7;
      overflow-y: auto; overflow-x: hidden;
      padding: 8px 0 24px;
    }
    .sidebar::-webkit-scrollbar { width: 0; }

    /* Section label */
    .sec { font-size: 0.62rem; font-weight: 600; text-transform: uppercase;
           letter-spacing: 0.5px; color: rgba(60,60,67,0.38);
           padding: 2px 16px 5px; margin-top: 10px; }

    /* Generic card */
    .card { background: #fff; border-radius: 12px; margin: 0 12px 2px; overflow: hidden; }

    /* ─ Flight card ─ */
    .fc { padding: 11px 13px; }
    .fc-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .fc-code {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.3px;
      padding: 2px 6px; border-radius: 5px;
    }
    .fc-code.bl { color:#007aff; background:rgba(0,122,255,0.1); }
    .fc-code.pu { color:#af52de; background:rgba(175,82,222,0.1); }
    .fc-carrier { font-size: 0.62rem; color: rgba(60,60,67,0.4); }
    .fc-airports { display:flex; align-items:center; margin-bottom:7px; }
    .fc-ap { flex:1; }
    .fc-ap.r { text-align:right; }
    .fc-iata { font-size:1.15rem; font-weight:300; color:#000; letter-spacing:-0.5px; line-height:1; }
    .fc-cn   { font-size:0.6rem; color:rgba(60,60,67,0.38); margin-top:1px; }
    .fc-mid  { flex:1; display:flex; align-items:center; gap:3px; padding:0 4px; padding-top:3px; }
    .fc-ln   { flex:1; height:0.5px; background:rgba(60,60,67,0.12); }
    .fc-pl   { font-size:0.6rem; color:rgba(60,60,67,0.28); }
    .fc-tags { display:flex; gap:4px; flex-wrap:wrap; }
    .fc-tag  { font-size:0.58rem; color:rgba(60,60,67,0.42); background:#f2f2f7; padding:2px 6px; border-radius:5px; }

    /* ─ Stats ─ */
    .stats { display:flex; }
    .stat  { flex:1; padding:11px 0; text-align:center; border-right:0.5px solid rgba(60,60,67,0.08); }
    .stat:last-child { border-right:none; }
    .stat-v { font-size:1.05rem; font-weight:600; color:#000; letter-spacing:-0.5px; }
    .stat-l { font-size:0.57rem; color:rgba(60,60,67,0.38); margin-top:2px; }

    /* ─ Day list ─ */
    .day-list { background:#fff; border-radius:12px; margin:0 12px 2px; overflow:hidden; }

    .day-row + .day-row { border-top: 0.5px solid rgba(60,60,67,0.07); }

    .day-main {
      display:flex; align-items:center; gap:9px;
      padding:9px 12px; cursor:pointer;
      transition: background 0.12s;
    }
    .day-main:active { background: rgba(60,60,67,0.04); }
    .day-main.hi     { background: rgba(0,122,255,0.04); }

    .day-badge {
      width:26px; height:26px; border-radius:50%;
      display:grid; place-items:center;
      font-size:0.62rem; font-weight:600; color:#fff; flex-shrink:0;
    }

    .day-text { flex:1; min-width:0; }
    .day-title {
      font-size:0.8rem; font-weight:500; color:#000;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      letter-spacing:-0.2px;
    }
    .day-sub { font-size:0.64rem; color:rgba(60,60,67,0.42); margin-top:1px; }

    /* i button */
    .ibtn {
      width:17px; height:17px; border-radius:50%;
      border:1.5px solid rgba(60,60,67,0.2);
      color:rgba(60,60,67,0.32);
      font-size:0.58rem; font-style:italic; font-weight:700;
      display:grid; place-items:center;
      cursor:pointer; flex-shrink:0;
      transition:all 0.14s; background:transparent;
      user-select:none; padding-bottom:1px;
    }
    .ibtn.on { border-color:#007aff; color:#007aff; background:rgba(0,122,255,0.08); }

    /* Detail expand */
    .day-det {
      max-height:0; overflow:hidden;
      transition: max-height 0.22s cubic-bezier(0.4,0,0.2,1);
    }
    .day-det.open { max-height:240px; }

    .det-inner {
      padding:6px 12px 10px 47px;
      display:flex; flex-direction:column; gap:3px;
      border-top:0.5px solid rgba(60,60,67,0.06);
      background:rgba(60,60,67,0.015);
    }

    .det-r {
      font-size:0.66rem; color:rgba(60,60,67,0.52);
      display:flex; gap:5px; line-height:1.55;
      align-items:flex-start;
    }
    .det-r .ico { flex-shrink:0; }
    .det-r .red { color:#ff3b30; }

    /* ─ Tips ─ */
    .tips-hdr {
      display:flex; align-items:center;
      padding:10px 12px; cursor:pointer;
      gap:8px;
    }
    .tips-title { flex:1; font-size:0.78rem; font-weight:500; color:#000; }
    .tips-body  { max-height:0; overflow:hidden; transition:max-height 0.22s cubic-bezier(0.4,0,0.2,1); }
    .tips-body.open { max-height:320px; }
    .tips-inner { padding:0 13px 12px 13px; border-top:0.5px solid rgba(60,60,67,0.07); }
    .tip-r {
      font-size:0.66rem; color:rgba(60,60,67,0.55);
      display:flex; gap:6px; line-height:1.55;
      padding-top:7px; align-items:flex-start;
    }
    .tip-r .red { color:#ff3b30; }

    /* ─ Map ─ */
    #map { flex:1; }

    /* ─ Popup ─ */
    .ios-popup .maplibregl-popup-content {
      background:rgba(255,255,255,0.97);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border:none; border-radius:14px;
      box-shadow:0 4px 20px rgba(0,0,0,0.1), 0 1px 3px rgba(0,0,0,0.06);
      padding:0; overflow:hidden;
    }
    .ios-popup .maplibregl-popup-tip { display:none; }
    .ios-popup .maplibregl-popup-close-button { display:none; }

    .pw      { padding:13px 15px; min-width:195px; }
    .pw-top  { display:flex; align-items:center; gap:9px; margin-bottom:6px; }
    .pw-dot  { width:26px; height:26px; border-radius:50%; display:grid; place-items:center; font-size:0.65rem; font-weight:600; color:#fff; flex-shrink:0; }
    .pw-name { font-size:0.9rem; font-weight:600; color:#000; letter-spacing:-0.3px; }
    .pw-sub  { font-size:0.63rem; color:rgba(60,60,67,0.42); margin-top:1px; }
    .pw-desc { font-size:0.69rem; color:rgba(60,60,67,0.52); line-height:1.5; margin-bottom:6px; }
    .pw-div  { height:0.5px; background:rgba(60,60,67,0.1); margin:5px 0; }
    .pw-row  { font-size:0.67rem; color:rgba(60,60,67,0.48); display:flex; align-items:center; gap:5px; }
    .pw-row b { color:#007aff; font-weight:500; }
    .pw-row.pu b { color:#af52de; }

    /* ─ Hamburger (desktop hidden) ─ */
    .hamburger {
      display:none; flex-direction:column; justify-content:center; gap:5px;
      width:36px; height:36px; padding:6px; cursor:pointer;
      border:none; background:none; flex-shrink:0; border-radius:8px;
    }
    .hamburger span {
      display:block; width:18px; height:1.5px;
      background:#000; border-radius:1px; transition:opacity 0.15s;
    }

    /* ─ Backdrop (hidden by default) ─ */
    .drawer-backdrop {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.28); z-index:499;
      backdrop-filter:blur(1px); -webkit-backdrop-filter:blur(1px);
    }
    .drawer-backdrop.open { display:block; }

    /* ─ Mobile ─ */
    @media (max-width: 767px) {
      header { padding: 8px 12px; gap:8px; }
      .hamburger { display:flex; }
      .hdr-icon { width:28px; height:28px; font-size:0.82rem; border-radius:7px; }
      header h1 { font-size:0.86rem; }
      header p  { font-size:0.59rem; }

      .layout { position:relative; }
      #map { position:absolute; inset:0; z-index:1; }

      .sidebar {
        position:fixed;
        top:0; left:0; bottom:0;
        width:85vw; max-width:310px;
        min-width:unset !important;
        overflow-y:auto; overflow-x:hidden;
        padding:8px 0 32px;
        transform:translateX(-100%);
        transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
        z-index:500;
        box-shadow:4px 0 24px rgba(0,0,0,0.14);
        border-radius:0 16px 16px 0;
      }
      .sidebar.open { transform:translateX(0); }

      .day-main { min-height:44px; }
    }
  </style>
</head>
<body>

<header>
  <button class="hamburger" id="hamburger" aria-label="選單">
    <span></span><span></span><span></span>
  </button>
  <div class="hdr-icon">🗺</div>
  <div>
    <h1>美西公路旅行 16–17 天</h1>
    <p>桃園 · JX32 · Seattle → Phoenix · JX25 · 桃園</p>
  </div>
</header>

<div class="layout">
  <div class="drawer-backdrop" id="backdrop"></div>
  <div class="sidebar" id="sb"></div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
/* ── Stop data (map markers) ── */
const stops = [
  { name:"西雅圖",      en:"Seattle, WA",                    lat:47.6062, lng:-122.3321, color:"#007aff", desc:"旅程起點，太空針塔、派克市場" },
  { name:"波特蘭",      en:"Portland, OR",                   lat:45.5051, lng:-122.6750, color:"#34c759", desc:"玫瑰城，Powell's書店、Multnomah瀑布" },
  { name:"奧勒岡海岸",  en:"Oregon Coast",                   lat:45.8918, lng:-123.9615, color:"#30d158", desc:"Cannon Beach、Haystack Rock" },
  { name:"紅木國家公園",en:"Redwood National & State Parks",  lat:41.2132, lng:-124.0046, color:"#34c759", desc:"全球最高大樹，古老紅木森林" },
  { name:"優勝美地",    en:"Yosemite National Park",         lat:37.8651, lng:-119.5383, color:"#a2845e", desc:"Half Dome、El Capitan、馬尾瀑布" },
  { name:"洛杉磯",      en:"Los Angeles, CA",                lat:34.0522, lng:-118.2437, color:"#ff9500", desc:"好萊塢、聖塔莫尼卡、比佛利山莊" },
  { name:"拉斯維加斯",  en:"Las Vegas, NV",                  lat:36.1699, lng:-115.1398, color:"#ff9500", desc:"賭城大道、夜生活、世界級娛樂" },
  { name:"錫安國家公園",en:"Zion National Park",             lat:37.2982, lng:-113.0263, color:"#ff3b30", desc:"天使降落步道、窄峽谷健行" },
  { name:"大峽谷",      en:"Grand Canyon National Park",     lat:36.0544, lng:-112.1401, color:"#ff3b30", desc:"世界七大奇景，南緣觀景台" },
  { name:"佩吉",        en:"Page, AZ",                       lat:36.9147, lng:-111.4558, color:"#ff9f0a", desc:"馬蹄灣、鮑威爾湖，羚羊谷入口" },
  { name:"羚羊峽谷",    en:"Antelope Canyon, AZ",            lat:36.8619, lng:-111.3743, color:"#ff9f0a", desc:"光束奇觀，全球最美峽谷之一" },
  { name:"鳳凰城",      en:"Phoenix, AZ",                    lat:33.4484, lng:-112.0740, color:"#30b0c7", desc:"旅程終點，搭機回台灣" },
];

/* ── Day itinerary ── */
const days = [
  { n:1,  col:'#007aff', title:'抵達西雅圖',       sub:'不開車',           si:0,
    i:{ dep:null,         hotel:'Seattle Downtown',            fuel:'無需加油',                        hi:['時差調整，輕鬆漫步市區'],                        warn:null } },
  { n:2,  col:'#007aff', title:'西雅圖市區',        sub:'🚗 1–2 hr',        si:0,
    i:{ dep:null,         hotel:'Seattle',                     fuel:'無需特別加油',                     hi:['Pike Place Market','Space Needle'],              warn:null } },
  { n:3,  col:'#34c759', title:'西雅圖 → 波特蘭',  sub:'🚗 3–3.5 hr',      si:1,
    i:{ dep:'08:30',      hotel:'Portland',                    fuel:'Centralia Outlets（休息＋廁所）',  hi:[],                                               warn:null } },
  { n:4,  col:'#34c759', title:'波特蘭 → 海岸',    sub:'🚗 1.5–2 hr',        si:2,
    i:{ dep:'09:00',      hotel:'Cannon Beach',                fuel:'Tillamook（補油＋冰淇淋）',        hi:[],                                               warn:null } },
  { n:5,  col:'#34c759', title:'海岸 → 紅木',      sub:'🚗 8–8.5 hr',    si:3,
    i:{ dep:'08:30',      hotel:'Crescent City',               fuel:'Brookings（最後大城補油）',        hi:[],                                               warn:'行程較長，建議不拖延' } },
  { n:6,  col:'#a2845e', title:'紅木 → 優勝美地',  sub:'🚗 9–9.5 hr',        si:4,
    i:{ dep:'07:30',      hotel:'Oakhurst / 公園外圍',         fuel:'Eureka 早餐 · Redding 午餐＋油',  hi:[],                                               warn:'重度疲勞日，07:30 準時出發' } },
  { n:7,  col:'#a2845e', title:'優勝美地探索',      sub:'🚗 0–2 hr（園內）', si:4,
    i:{ dep:null,         hotel:'Yosemite',                    fuel:'進園前務必補滿油',                 hi:['Tunnel View','Glacier Point'],                  warn:null } },
  { n:8,  col:'#a2845e', title:'優勝美地 → LA',    sub:'🚗 6–6.5 hr',      si:5,
    i:{ dep:'08:00',      hotel:'Santa Monica / Hollywood',    fuel:'Bakersfield（午餐＋油）',          hi:[],                                               warn:'進 LA 可能嚴重塞車' } },
  { n:9,  col:'#ff9500', title:'洛杉磯',            sub:'🚗 市區短程',       si:5,
    i:{ dep:null,         hotel:'LA',                          fuel:null,                              hi:['Universal Studios','Disneyland'],                warn:null } },
  { n:10, col:'#ff9500', title:'洛杉磯 海岸',       sub:'🚗 市區短程',       si:5,
    i:{ dep:null,         hotel:'LA',                          fuel:'Malibu 短程順路可加油',            hi:['Santa Monica','Venice Beach','Malibu'],          warn:null } },
  { n:11, col:'#ff9500', title:'LA → 拉斯維加斯',  sub:'🚗 4–4.5 hr',      si:6,
    i:{ dep:'09:00',      hotel:'Las Vegas Strip',             fuel:'Barstow（加油＋Outlet）',          hi:[],                                               warn:null } },
  { n:12, col:'#ff3b30', title:'Vegas → 錫安',     sub:'🚗 2.5–3 hr',    si:7,
    i:{ dep:'08:30',      hotel:'Springdale',                  fuel:'St. George（最後補油）',           hi:[],                                               warn:null } },
  { n:13, col:'#ff3b30', title:'錫安 → 大峽谷',    sub:'🚗 4.5–5 hr',      si:8,
    i:{ dep:'08:00',      hotel:'Tusayan',                     fuel:'Kanab（午餐）',                    hi:[],                                               warn:null } },
  { n:14, col:'#ff9f0a', title:'大峽谷 → 佩吉',    sub:'🚗 2.5–3 hr',      si:9,
    i:{ dep:'09:00',      hotel:'Page',                        fuel:'Cameron Trading Post（補給）',     hi:[],                                               warn:null } },
  { n:15, col:'#ff9f0a', title:'羚羊峽谷',          sub:'🚗 1 hr 內',        si:10,
    i:{ dep:'07:00',      hotel:'Page（第二晚）',               fuel:'無需長途移動',                     hi:['Upper Antelope（光束）','Lower Antelope（地形）'], warn:'導覽票需提前預訂' } },
  { n:16, col:'#ff9f0a', title:'佩吉 → 鳳凰城',    sub:'🚗 4–4.5 hr',        si:11,
    i:{ dep:'09:00',      hotel:'Phoenix',                     fuel:'Flagstaff（午餐）',                hi:[],                                               warn:null } },
];

/* ── Helpers ── */
const sb = document.getElementById('sb');
const mk = (t,c,h) => { const e=document.createElement(t); if(c)e.className=c; if(h)e.innerHTML=h; return e; };
const lbl = t => { const e=mk('div','sec'); e.textContent=t; return e; };

/* ── Flight card ── */
function flightCard(from,fromCity,to,toCity,code,dur,aircraft,extra,pu) {
  const wrap = mk('div','card'), fc = mk('div','fc');
  fc.innerHTML = `
    <div class="fc-top">
      <span class="fc-code ${pu?'pu':'bl'}">${code}</span>
      <span class="fc-carrier">星宇航空 STARLUX</span>
    </div>
    <div class="fc-airports">
      <div class="fc-ap"><div class="fc-iata">${from}</div><div class="fc-cn">${fromCity}</div></div>
      <div class="fc-mid"><div class="fc-ln"></div><div class="fc-pl">✈</div><div class="fc-ln"></div></div>
      <div class="fc-ap r"><div class="fc-iata">${to}</div><div class="fc-cn">${toCity}</div></div>
    </div>
    <div class="fc-tags">
      <span class="fc-tag">⏱ ${dur}</span>
      <span class="fc-tag">${aircraft}</span>
      ${extra?`<span class="fc-tag">${extra}</span>`:''}
    </div>`;
  wrap.appendChild(fc);
  return wrap;
}

/* ── Stats card ── */
function statsCard() {
  const wrap = mk('div','card'), s = mk('div','stats');
  s.innerHTML = `
    <div class="stat"><div class="stat-v">16</div><div class="stat-l">旅行天數</div></div>
    <div class="stat"><div class="stat-v">47h</div><div class="stat-l">開車時數</div></div>
    <div class="stat"><div class="stat-v">2,400+</div><div class="stat-l">總英里</div></div>`;
  wrap.appendChild(s);
  return wrap;
}

/* ── Day list ── */
function buildDays() {
  const list = mk('div','day-list');

  days.forEach(d => {
    const row = mk('div','day-row');
    row.dataset.si = d.si;

    const main = mk('div','day-main');

    const badge = mk('div','day-badge');
    badge.style.background = stops[d.si].color;
    badge.textContent = d.si + 1;

    const txt = mk('div','day-text');
    txt.innerHTML = `<div class="day-title">${d.title}</div><div class="day-sub">Day ${d.n} · ${d.sub}</div>`;

    const ibtn = mk('div','ibtn'); ibtn.textContent = 'i';

    main.append(badge, txt, ibtn);

    // Detail
    const det = mk('div','day-det');
    const inner = mk('div','det-inner');

    const rows = [];
    if (d.i.dep)  rows.push(['🕘', d.i.dep]);
    if (d.i.hotel) rows.push(['🏨', d.i.hotel]);
    if (d.i.fuel)  rows.push(['⛽', d.i.fuel]);
    d.i.hi.forEach(h => rows.push(['📍', h]));
    if (d.i.warn)  rows.push(['⚠️', d.i.warn, true]);

    rows.forEach(([icon, text, isWarn]) => {
      const r = mk('div','det-r');
      r.innerHTML = `<span class="ico">${icon}</span><span${isWarn?' class="red"':''}>${text}</span>`;
      inner.appendChild(r);
    });

    det.appendChild(inner);
    row.append(main, det);

    // Toggle i
    ibtn.addEventListener('click', e => {
      e.stopPropagation();
      const open = det.classList.toggle('open');
      ibtn.classList.toggle('on', open);
    });

    // Click row → map
    main.addEventListener('click', () => focusStop(d.si));

    list.appendChild(row);
  });

  return list;
}

/* ── Tips card ── */
function tipsCard() {
  const wrap = mk('div','card');
  const hdr  = mk('div','tips-hdr');
  const ibtn = mk('div','ibtn'); ibtn.textContent = 'i';
  hdr.innerHTML = `<span class="tips-title">⛽ 加油與駕駛注意事項</span>`;
  hdr.appendChild(ibtn);

  const body  = mk('div','tips-body');
  const inner = mk('div','tips-inner');
  [
    ['⛽', '每 300–400 km 補油一次，郊區加油站距離遠'],
    ['🏞️', '進國家公園前務必加滿（Yosemite · Zion · Page）'],
    ['😴', '每 2 小時停車休息，防止疲勞累積'],
    ['⚠️', '最累三天：Day 5 海岸→紅木 · Day 6 紅木→優勝美地 · Day 8 優勝美地→LA', true],
    ['💡', '最大挑戰不是距離，而是疲勞；放慢節奏比趕路重要'],
  ].forEach(([icon, text, isWarn]) => {
    const r = mk('div','tip-r');
    r.innerHTML = `<span>${icon}</span><span${isWarn?' class="red"':''}>${text}</span>`;
    inner.appendChild(r);
  });
  body.appendChild(inner);
  wrap.append(hdr, body);

  hdr.addEventListener('click', () => {
    const open = body.classList.toggle('open');
    ibtn.classList.toggle('on', open);
  });
  return wrap;
}

/* ── Assemble sidebar ── */
sb.appendChild(lbl('出發'));
sb.appendChild(flightCard('TPE','桃園','SEA','西雅圖','JX32','約 10 hr 14 min','A350-900','',false));

sb.appendChild(lbl('行程概覽'));
sb.appendChild(statsCard());

sb.appendChild(lbl('每日行程'));
sb.appendChild(buildDays());

sb.appendChild(lbl('注意事項'));
sb.appendChild(tipsCard());

sb.appendChild(lbl('回程'));
sb.appendChild(flightCard('PHX','鳳凰城','TPE','桃園','JX25','約 14 hr 30 min','A350-900','週二 / 四 / 日',true));

/* ── Map ── */
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/liberty',
  center: [-114, 39.5],
  zoom: 4.5,
  attributionControl: false
});

map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');

function makeMarkerEl(num, color) {
  const el = document.createElement('div');
  el.style.cssText = 'cursor:pointer;line-height:0;';
  el.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <filter id="fm${num}"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.14"/></filter>
    <path d="M14 2C8.5 2 4 6.5 4 12c0 8 10 22 10 22S24 20 24 12C24 6.5 19.5 2 14 2z"
      fill="${color}" filter="url(#fm${num})"/>
    <circle cx="14" cy="12" r="5.5" fill="rgba(255,255,255,0.2)"/>
    <text x="14" y="16" text-anchor="middle" font-size="7.5" font-weight="600"
      font-family="-apple-system,sans-serif" fill="#fff">${num}</text>
  </svg>`;
  return el;
}

const markers = [];

map.on('load', () => {
  /* 路線 */
  map.addSource('route', {
    type: 'geojson',
    data: { type:'Feature', geometry: {
      type: 'LineString',
      coordinates: stops.map(s => [s.lng, s.lat])
    }}
  });
  map.addLayer({
    id: 'route', type: 'line', source: 'route',
    paint: {
      'line-color': '#ff9500',
      'line-width': 2,
      'line-opacity': 0.55,
      'line-dasharray': [3, 3]
    }
  });

  /* 標記 + Popup */
  stops.forEach((s, i) => {
    const el = makeMarkerEl(i + 1, s.color);

    const dayNums = days.filter(d => d.si === i).map(d => `Day ${d.n}`).join(' · ');
    let extra = '';
    if (i === 0)  extra = `<div class="pw-div"></div><div class="pw-row"><span>✈️</span><span>JX32 桃園→西雅圖 · <b>約 10h 14m</b></span></div>`;
    if (i === 11) extra = `<div class="pw-div"></div><div class="pw-row pu"><span>✈️</span><span>JX25 鳳凰城→桃園 · <b>約 14h 30m</b></span></div>`;

    const popup = new maplibregl.Popup({
      className: 'ios-popup',
      maxWidth: '230px',
      offset: [0, -38],
      closeButton: false,
      closeOnClick: true
    }).setHTML(`<div class="pw">
      <div class="pw-top">
        <div class="pw-dot" style="background:${s.color}">${i+1}</div>
        <div><div class="pw-name">${s.name}</div><div class="pw-sub">${s.en}</div></div>
      </div>
      <div class="pw-desc">${s.desc}</div>
      ${dayNums ? `<div class="pw-row" style="margin-bottom:4px"><span>📅</span><span>${dayNums}</span></div>` : ''}
      ${extra}
    </div>`);

    const marker = new maplibregl.Marker({ element: el, anchor: 'bottom' })
      .setLngLat([s.lng, s.lat])
      .setPopup(popup)
      .addTo(map);

    el.addEventListener('click', () => highlightRows(i));
    markers.push(marker);
  });
});

function focusStop(si) {
  map.flyTo({ center: [stops[si].lng, stops[si].lat], zoom: 8, speed: 1.4 });
  setTimeout(() => {
    if (!markers[si]) return;
    if (!markers[si].getPopup().isOpen()) markers[si].togglePopup();
  }, 50);
  highlightRows(si);
}

function highlightRows(si) {
  document.querySelectorAll('.day-main').forEach(e => e.classList.remove('hi'));
  document.querySelectorAll(`.day-row[data-si="${si}"] .day-main`).forEach(e => e.classList.add('hi'));
}

/* ── Mobile drawer ── */
(function() {
  const sidebar  = document.getElementById('sb');
  const hamburger = document.getElementById('hamburger');
  const backdrop = document.getElementById('backdrop');

  function open()  { sidebar.classList.add('open');    backdrop.classList.add('open'); }
  function close() { sidebar.classList.remove('open'); backdrop.classList.remove('open'); }

  hamburger.addEventListener('click', () =>
    sidebar.classList.contains('open') ? close() : open()
  );

  backdrop.addEventListener('click', close);

  // 點行程列後關閉抽屜，讓地圖可見
  document.querySelectorAll('.day-main').forEach(el =>
    el.addEventListener('click', close)
  );

  // 左滑手勢關閉抽屜
  let startX = 0;
  sidebar.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  sidebar.addEventListener('touchend', e => {
    if (startX - e.changedTouches[0].clientX > 50) close();
  }, { passive: true });
})();
</script>
</body>
